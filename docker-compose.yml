version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: postgres-imy772
    restart: unless-stopped
    environment:
      POSTGRES_DB: IMY772
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: imy772-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./Backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "yarn install && yarn start"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/IMY772

volumes:
  postgres_data:
