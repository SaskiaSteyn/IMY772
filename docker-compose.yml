services:
    db:
        image: postgres:16-alpine
        container_name: postgres-imy772
        restart: unless-stopped
        environment:
            POSTGRES_DB: IMY772
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - '5433:5433'
        command: ['postgres', '-p', '5433']
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -p 5433']
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        image: node:20-slim
        container_name: imy772-backend
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./backend:/app
            - /app/node_modules
            - backend_state:/app/state
        ports:
            - '3000:3000'
        command: >
            sh -c "
            apt-get update &&
            apt-get install -y python3 python3-pip build-essential libatlas-base-dev liblapack-dev gfortran libgl1 openssl &&
            python3 -m pip install --upgrade pip setuptools wheel &&
            python3 -m pip install --no-cache-dir paddleocr pillow || true &&
            yarn install &&
            npx prisma generate &&
            npx prisma migrate deploy || true &&
            mkdir -p /app/state &&
            if [ ! -f /app/state/.seeded ]; then
              node prisma/seed.js &&
              touch /app/state/.seeded;
            fi &&
            yarn start
            "
        depends_on:
            db:
                condition: service_healthy
        environment:
            DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5433/IMY772
            PRISMA_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5433/IMY772
            OCR_WORKER_TIMEOUT_MS: '30000'
            OCR_CONFIDENCE_THRESHOLD: '0.75'
            OCR_PADDLE_LANGUAGES: 'en'
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -f http://localhost:3000/api/auth/me || exit 1',
                ]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
    backend_state:
