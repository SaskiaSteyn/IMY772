services:
    db:
        image: postgres:16-alpine
        container_name: postgres-imy772
        restart: unless-stopped
        environment:
            POSTGRES_DB: IMY772
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - '5433:5433'
        command: ['postgres', '-p', '5433']
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -p 5433']
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        image: node:20-alpine
        container_name: imy772-backend
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./backend:/app
            - /app/node_modules
            - backend_state:/app/state
        ports:
            - '3000:3000'
        command: >
            sh -c "
            echo 'Installing dependencies...' &&
            npm install --prefer-offline --no-audit --no-fund &&
            echo 'Generating Prisma client...' &&
            npx prisma generate &&
            echo 'Fixing any stuck migrations...' &&
            node scripts/fix-migration.js &&
            echo 'Running migrations...' &&
            npx prisma migrate deploy 2>&1 || (echo '--- MIGRATION FAILED (see above) ---' && exit 1) &&
            echo 'Migrations completed successfully' &&
            echo 'Running seed script (skips if data already exists)...' &&
            node prisma/seed.js 2>&1 || true &&
            npm run seed:admin 2>&1 || true &&
            npm start
            "
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - .env
        environment:
            PRISMA_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5433/IMY772
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -f http://localhost:3000/api/auth/me || exit 1',
                ]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
    backend_state:
