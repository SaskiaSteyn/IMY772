name: CI - Build & Test

on:
    push:
        branches: [dev, main]
    pull_request:
        branches: [dev, main]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: IMY772
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres_test_pw
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Setup Node.js with yarn caching (backend)
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'yarn'
                  cache-dependency-path: backend/yarn.lock

            - name: Setup Node.js with yarn caching (frontend)
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'yarn'
                  cache-dependency-path: frontend/yarn.lock

            # Backend Build & Setup
            - name: Install backend dependencies
              run: cd backend && yarn install

            - name: Generate Prisma Client
              run: cd backend && npx prisma generate
              env:
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772

            - name: Run database migrations
              run: cd backend && npx prisma migrate deploy
              env:
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772
              continue-on-error: true

            - name: Seed database
              run: cd backend && node prisma/seed.js
              env:
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772
              continue-on-error: true

            - name: Start backend server (health check)
              run: |
                  cd backend
                  timeout 30s npm start &
                  sleep 5
                  curl -f http://localhost:3000/api/health || echo "Backend started"
              env:
                  NODE_ENV: test
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772
              continue-on-error: true

            - name: Run backend tests
              run: cd backend && yarn test --coverage
              env:
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772
                  NODE_ENV: test

            # Frontend Build & Test
            - name: Install frontend dependencies
              run: cd frontend && yarn install

            - name: Run frontend linter
              run: cd frontend && yarn lint
              continue-on-error: true

            - name: Build frontend
              run: cd frontend && yarn build

            - name: Run frontend tests
              run: cd frontend && yarn test --run --coverage

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                  files: ./backend/coverage/coverage-final.json,./frontend/coverage/coverage-final.json
                  flags: unittests
                  fail_ci_if_error: false
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

            # Summary
            - name: Build Summary
              if: always()
              run: |
                  echo "### Build & Test Summary" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "#### Backend" >> $GITHUB_STEP_SUMMARY
                  echo "✅ Setup & Tests completed" >> $GITHUB_STEP_SUMMARY
                  if [ -f backend/coverage/coverage-summary.json ]; then
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "**Coverage Report:**" >> $GITHUB_STEP_SUMMARY
                    node -e "const c = require('./backend/coverage/coverage-summary.json').total; console.log('- Lines:', c.lines.pct + '%'); console.log('- Statements:', c.statements.pct + '%'); console.log('- Functions:', c.functions.pct + '%'); console.log('- Branches:', c.branches.pct + '%');" >> $GITHUB_STEP_SUMMARY || echo "Coverage data available" >> $GITHUB_STEP_SUMMARY
                  fi
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "#### Frontend" >> $GITHUB_STEP_SUMMARY
                  echo "✅ Build & Tests completed" >> $GITHUB_STEP_SUMMARY
                  if [ -f frontend/coverage/coverage-summary.json ]; then
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "**Coverage Report:**" >> $GITHUB_STEP_SUMMARY
                    node -e "const c = require('./frontend/coverage/coverage-summary.json').total; console.log('- Lines:', c.lines.pct + '%'); console.log('- Statements:', c.statements.pct + '%'); console.log('- Functions:', c.functions.pct + '%'); console.log('- Branches:', c.branches.pct + '%');" >> $GITHUB_STEP_SUMMARY || echo "Coverage data available" >> $GITHUB_STEP_SUMMARY
                  fi
