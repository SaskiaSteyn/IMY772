name: CI - Build & Test

on:
    push:
        branches: [dev, main]
    pull_request:
        branches: [dev, main]

jobs:
    backend-tests:
        runs-on: ubuntu-latest
        # Always run on push and PR. (Path-based skipping via head_commit.modified
        # is unreliable for merge commits — pushes to main are merges, so it would
        # wrongly skip and make the run conclude 'skipped', blocking the deploy gate.)

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_DB: IMY772
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres_test_pw
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 5432:5432

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js with yarn caching
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'yarn'
                  cache-dependency-path: backend/yarn.lock

            # Backend Build & Setup
            - name: Install backend dependencies
              run: cd backend && yarn install

            - name: Generate Prisma Client
              run: cd backend && npx prisma generate
              env:
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772

            - name: Run database migrations
              run: cd backend && npx prisma migrate deploy
              env:
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772
              continue-on-error: true

            - name: Seed database
              run: cd backend && node prisma/seed.js
              env:
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772
              continue-on-error: true

            - name: Start backend server (health check)
              run: |
                  cd backend
                  timeout 30s npm start &
                  sleep 5
                  curl -f http://localhost:3000/api/health || echo "Backend started"
              env:
                  NODE_ENV: test
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772
              continue-on-error: true

            - name: Run backend tests
              run: cd backend && yarn test --coverage
              env:
                  PRISMA_DATABASE_URL: postgresql://postgres:postgres_test_pw@localhost:5432/IMY772
                  NODE_ENV: test

            - name: Upload backend coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                  files: ./backend/coverage/coverage-final.json
                  flags: backend
                  fail_ci_if_error: false
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

            - name: Backend Test Summary
              if: always()
              run: |
                  echo "### Backend Tests Summary" >> $GITHUB_STEP_SUMMARY
                  echo "✅ Setup & Tests completed" >> $GITHUB_STEP_SUMMARY
                  if [ -f backend/coverage/coverage-summary.json ]; then
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "**Coverage Report:**" >> $GITHUB_STEP_SUMMARY
                    node -e "const c = require('./backend/coverage/coverage-summary.json').total; console.log('- Lines:', c.lines.pct + '%'); console.log('- Statements:', c.statements.pct + '%'); console.log('- Functions:', c.functions.pct + '%'); console.log('- Branches:', c.branches.pct + '%');" >> $GITHUB_STEP_SUMMARY || echo "Coverage data available" >> $GITHUB_STEP_SUMMARY
                  fi

    frontend-tests:
        runs-on: ubuntu-latest
        # Always run on push and PR — see note on backend-tests above.

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js with yarn caching
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'yarn'
                  cache-dependency-path: frontend/yarn.lock

            - name: Install frontend dependencies
              run: cd frontend && yarn install

            - name: Run frontend linter
              run: cd frontend && yarn lint
              continue-on-error: true

            - name: Build frontend
              run: cd frontend && yarn build

            - name: Start frontend dev server
              run: |
                  cd frontend
                  yarn dev > /tmp/vite.log 2>&1 &
                  sleep 5
                  curl -f http://localhost:5173 || echo "Server starting..."
              timeout-minutes: 1

            - name: Run Cypress e2e tests
              run: cd frontend && npx cypress run
              continue-on-error: true

            - name: Frontend Test Summary
              if: always()
              run: |
                  echo "### Frontend Cypress Tests Summary" >> $GITHUB_STEP_SUMMARY
                  echo "✅ Build & Cypress Tests completed" >> $GITHUB_STEP_SUMMARY
                  if [ -f frontend/coverage/coverage-summary.json ]; then
                    echo "" >> $GITHUB_STEP_SUMMARY
                    echo "**Coverage Report:**" >> $GITHUB_STEP_SUMMARY
                    node -e "const c = require('./frontend/coverage/coverage-summary.json').total; console.log('- Lines:', c.lines.pct + '%'); console.log('- Statements:', c.statements.pct + '%'); console.log('- Functions:', c.functions.pct + '%'); console.log('- Branches:', c.branches.pct + '%');" >> $GITHUB_STEP_SUMMARY || echo "Coverage data available" >> $GITHUB_STEP_SUMMARY
                  fi
