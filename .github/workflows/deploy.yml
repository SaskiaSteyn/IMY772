name: Deploy to AWS (EC2)

# Manual deploy to the MicroTrack EC2 host via SSM (no SSH). Gated on CI passing
# for the deployed commit. Needs repo secrets AWS_ACCESS_KEY_ID /
# AWS_SECRET_ACCESS_KEY; see deploy/README.md for the IAM policy.

on:
    workflow_dispatch: {}

concurrency:
    group: deploy-ec2-prod
    cancel-in-progress: false

env:
    AWS_REGION: us-east-1
    INSTANCE_ID: i-014127f47881b6eea

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
        steps:
            - name: Require CI to have passed for the commit being deployed
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  REF_NAME: ${{ github.ref_name }}
                  TARGET_SHA: ${{ github.sha }}
              run: |
                  set -euo pipefail

                  # deploy.sh always ships dev; refuse dispatch from any other branch
                  if [ "$REF_NAME" != "dev" ]; then
                    echo "::error::Deploy must be run from the 'dev' branch (got '$REF_NAME')."
                    exit 1
                  fi

                  # gate on CI for the exact commit being deployed, not the latest branch run
                  echo "Commit to deploy: $TARGET_SHA"
                  CONCLUSION=$(gh run list --repo "$REPO" \
                    --workflow "CI - Build & Test" --branch dev \
                    --json headSha,status,conclusion \
                    --jq "[.[] | select(.headSha==\"$TARGET_SHA\" and .status==\"completed\")][0].conclusion // \"none\"")
                  echo "CI conclusion for $TARGET_SHA: $CONCLUSION"
                  if [ "$CONCLUSION" != "success" ]; then
                    echo "::error::Refusing to deploy — CI for $TARGET_SHA is '$CONCLUSION', not a completed 'success'."
                    exit 1
                  fi

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-region: ${{ env.AWS_REGION }}
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

            - name: Run deploy on EC2 via SSM
              env:
                  TARGET_SHA: ${{ github.sha }}
              run: |
                  set -euo pipefail

                  # pull deploy.sh at the gated commit, run it pinned to that SHA
                  read -r -d '' BOOTSTRAP <<EOS || true
                  set -e
                  cd /home/ubuntu/IMY772
                  sudo -u ubuntu git fetch --prune origin dev
                  sudo -u ubuntu git checkout ${TARGET_SHA} -- deploy/deploy.sh
                  chmod +x deploy/deploy.sh
                  bash deploy/deploy.sh --no-fetch --ref ${TARGET_SHA}
                  EOS

                  # jq-encode params so the multiline bootstrap can't corrupt CLI shorthand
                  jq -n --arg cmd "$BOOTSTRAP" '{commands: [$cmd]}' > /tmp/ssm-params.json

                  echo "Sending deploy command to ${INSTANCE_ID}..."
                  CID=$(aws ssm send-command \
                    --instance-ids "$INSTANCE_ID" \
                    --document-name "AWS-RunShellScript" \
                    --comment "GH deploy ${GITHUB_SHA::7}" \
                    --parameters file:///tmp/ssm-params.json \
                    --query "Command.CommandId" --output text)
                  echo "CommandId=$CID"

                  # poll for completion (build on a t3.small takes a few minutes)
                  DEADLINE=$(( SECONDS + 720 ))
                  STATUS="Pending"
                  while [ $SECONDS -lt $DEADLINE ]; do
                    STATUS=$(aws ssm get-command-invocation \
                      --command-id "$CID" --instance-id "$INSTANCE_ID" \
                      --query "Status" --output text 2>/dev/null || echo "Pending")
                    case "$STATUS" in
                      Success|Failed|Cancelled|TimedOut) break ;;
                    esac
                    echo "  ...status=$STATUS"
                    sleep 10
                  done

                  echo "===================== DEPLOY STDOUT ====================="
                  aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" \
                    --query "StandardOutputContent" --output text || true
                  echo "===================== DEPLOY STDERR ====================="
                  aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" \
                    --query "StandardErrorContent" --output text || true
                  echo "========================================================"

                  echo "Final status: $STATUS"
                  [ "$STATUS" = "Success" ]
