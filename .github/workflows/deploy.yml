name: Deploy to AWS (EC2)

# Deploys the MicroTrack EC2 host via SSM (no SSH). Auto-runs after CI passes on
# 'main', and can also be dispatched manually. Needs repo secrets
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY; see deploy/README.md for the IAM
# policy.
#
# NOTE: workflow_run only fires when this file is on the repo's DEFAULT branch
# (currently 'dev'), so this workflow must be merged into dev to auto-deploy —
# even though the commit it ships comes from 'main'.

on:
    workflow_run:
        workflows: ['CI - Build & Test']
        types: [completed]
        branches: [main]
    workflow_dispatch: {}

concurrency:
    group: deploy-ec2-prod
    cancel-in-progress: false

env:
    AWS_REGION: us-east-1
    INSTANCE_ID: i-014127f47881b6eea

jobs:
    deploy:
        runs-on: ubuntu-latest
        # On the workflow_run path, only proceed when CI actually succeeded.
        # Manual dispatch is gated separately below.
        if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
        permissions:
            actions: read
            contents: read
        steps:
            - name: Resolve the commit to deploy
              id: target
              env:
                  EVENT_NAME: ${{ github.event_name }}
                  # workflow_run: github.sha is the DEFAULT branch head, not the
                  # commit that passed CI — use the triggering run's head instead.
                  WR_SHA: ${{ github.event.workflow_run.head_sha }}
                  WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
                  DISPATCH_SHA: ${{ github.sha }}
                  DISPATCH_REF: ${{ github.ref_name }}
              run: |
                  set -euo pipefail

                  if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
                    REF_NAME="$DISPATCH_REF"
                    TARGET_SHA="$DISPATCH_SHA"
                  else
                    REF_NAME="$WR_BRANCH"
                    TARGET_SHA="$WR_SHA"
                  fi

                  # deploy.sh ships main; refuse anything else
                  if [ "$REF_NAME" != "main" ]; then
                    echo "::error::Deploy only ships the 'main' branch (got '$REF_NAME')."
                    exit 1
                  fi

                  echo "Commit to deploy: $TARGET_SHA"
                  echo "ref_name=$REF_NAME" >> "$GITHUB_OUTPUT"
                  echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

            - name: Require CI to have passed (manual dispatch only)
              # The workflow_run path is already gated on success by the job `if`.
              if: ${{ github.event_name == 'workflow_dispatch' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPO: ${{ github.repository }}
                  TARGET_SHA: ${{ steps.target.outputs.target_sha }}
              run: |
                  set -euo pipefail

                  # gate on CI for the exact commit being deployed, not the latest branch run
                  CONCLUSION=$(gh run list --repo "$REPO" \
                    --workflow "CI - Build & Test" --branch main \
                    --json headSha,status,conclusion \
                    --jq "[.[] | select(.headSha==\"$TARGET_SHA\" and .status==\"completed\")][0].conclusion // \"none\"")
                  echo "CI conclusion for $TARGET_SHA: $CONCLUSION"
                  if [ "$CONCLUSION" != "success" ]; then
                    echo "::error::Refusing to deploy — CI for $TARGET_SHA is '$CONCLUSION', not a completed 'success'."
                    exit 1
                  fi

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-region: ${{ env.AWS_REGION }}
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

            - name: Run deploy on EC2 via SSM
              env:
                  TARGET_SHA: ${{ steps.target.outputs.target_sha }}
              run: |
                  set -euo pipefail

                  # pull deploy.sh at the gated commit, run it pinned to that SHA
                  read -r -d '' BOOTSTRAP <<EOS || true
                  set -e
                  cd /home/ubuntu/IMY772
                  sudo -u ubuntu git fetch --prune origin main
                  sudo -u ubuntu git checkout ${TARGET_SHA} -- deploy/deploy.sh
                  chmod +x deploy/deploy.sh
                  bash deploy/deploy.sh --no-fetch --ref ${TARGET_SHA}
                  EOS

                  # jq-encode params so the multiline bootstrap can't corrupt CLI shorthand
                  jq -n --arg cmd "$BOOTSTRAP" '{commands: [$cmd]}' > /tmp/ssm-params.json

                  echo "Sending deploy command to ${INSTANCE_ID}..."
                  CID=$(aws ssm send-command \
                    --instance-ids "$INSTANCE_ID" \
                    --document-name "AWS-RunShellScript" \
                    --comment "GH deploy ${TARGET_SHA::7}" \
                    --parameters file:///tmp/ssm-params.json \
                    --query "Command.CommandId" --output text)
                  echo "CommandId=$CID"

                  # poll for completion (build on a t3.small takes a few minutes)
                  DEADLINE=$(( SECONDS + 720 ))
                  STATUS="Pending"
                  while [ $SECONDS -lt $DEADLINE ]; do
                    STATUS=$(aws ssm get-command-invocation \
                      --command-id "$CID" --instance-id "$INSTANCE_ID" \
                      --query "Status" --output text 2>/dev/null || echo "Pending")
                    case "$STATUS" in
                      Success|Failed|Cancelled|TimedOut) break ;;
                    esac
                    echo "  ...status=$STATUS"
                    sleep 10
                  done

                  echo "===================== DEPLOY STDOUT ====================="
                  aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" \
                    --query "StandardOutputContent" --output text || true
                  echo "===================== DEPLOY STDERR ====================="
                  aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" \
                    --query "StandardErrorContent" --output text || true
                  echo "========================================================"

                  echo "Final status: $STATUS"
                  [ "$STATUS" = "Success" ]
